name: Release Portable

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build portable artifact
        run: npm run dist:portable

      - name: Locate portable exe
        id: find_asset
        shell: pwsh
        run: |
          $file = Get-ChildItem release -File -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $file) {
            throw "No portable exe found under app/release"
          }
          "path=$($file.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.find_asset.outputs.path }}
